variant: fcos
version: 1.5.0
passwd:
  users:
    - name: root
      ### Generate password -> openssl passwd -6 -salt "test"
      password_hash: $6$test$rqVNhXeFVHA3yzsfap9jTZMTkLuPQpsQMF2HWUfpcXYKyP9IPgte4frtqcgvNChjljNZVI1ygiG/q8xGUKJWp0
      ### Generate ssh key-pairs with "ssh-keygen -t rsa"
      ### Copy from ~/.ssh/id_rsa.pub
      ssh_authorized_keys:
        - ssh-rsa
          
          gerald@gpm-laptop
systemd:
  units:
    - name: systemd-sysupdate.timer
      enabled: true
    - name: locksmithd.service
      # NOTE: To coordinate the node reboot in this context, we recommend to use Kured.
      mask: true
    - name: systemd-sysupdate.service
      dropins:
        - name: kubernetes.conf
          contents: |
            [Service]
            ExecStartPre=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/kubernetes.raw > /tmp/kubernetes"
            ExecStartPre=/usr/lib/systemd/systemd-sysupdate -C kubernetes update
            ExecStartPost=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/kubernetes.raw > /tmp/kubernetes-new"
            ExecStartPost=/usr/bin/sh -c "if ! cmp --silent /tmp/kubernetes /tmp/kubernetes-new; then touch /run/reboot-required; fi"
        - name: crio.conf
          contents: |
            [Service]
            ExecStartPre=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/crio.raw > /tmp/crio"
            ExecStartPre=/usr/lib/systemd/systemd-sysupdate -C crio update
            ExecStartPost=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/crio.raw > /tmp/crio-new"
            ExecStartPost=/usr/bin/sh -c "if ! cmp --silent /tmp/crio /tmp/crio-new; then touch /run/reboot-required; fi"
    - name: zfs-setup.service
      enabled: true
      contents: |
        [Unit]
        Description=Load zfs kernel modules
        After=local-fs-pre.target
        Wants=local-fs-pre.target

        [Service]
        Type=oneshot
        ExecStart=/usr/bin/modprobe zfs
        RemainAfterExit=true

        [Install]
        WantedBy=multi-user.target
storage:
  links:
    ### Disable docker and containerd
    - path: /etc/extensions/docker-flatcar.raw
      target: /dev/null
      overwrite: true
    - path: /etc/extensions/containerd-flatcar.raw
      target: /dev/null
      overwrite: true
  files:
    - path: /etc/flatcar/enabled-sysext.conf
      contents:
        inline: |
          zfs
          podman
      mode: 644
    - path: /etc/sysupdate.d/noop.conf
      contents:
        inline: |
          [Source]
          Type=regular-file
          Path=/
          MatchPattern=invalid@v.raw
          [Target]
          Type=regular-file
          Path=/
    - path: /etc/containers/policy.json
      contents:
        inline: |
          {
            "default": [
              {
                "type": "insecureAcceptAnything"
              }
            ]
          }
    ### Initial Node IP
    - path: /etc/hostname
      overwrite: true
      mode: 644
      contents:
        inline: |-
          ###HOSTNAME###
    ### The default interface naming is eth0
    - path: /etc/systemd/network/00-eth0.network
      contents:
        inline: |
          [Match]
          Name=eth0

          [Network]
          Address=###IP_ADDRESS###/###CIDR###,###IP_GATEWAY###
          Gateway=###IP_GATEWAY###
          DNS=###IP_GATEWAY###
    - path: /etc/hosts
      mode: 644
      overwrite: true
      contents:
        inline: |
          127.0.0.1 localhost localhost.localdomain
          ::1		localhost localhost.localdomain ipv6-localhost ipv6-loopback

          ###IP_ADDRESS### ###HOSTNAME### ###HOSTNAME###.local ###HOSTNAME###.gpm.my.id
